services:
  backend:
    build: ./backend
    container_name: genai-backend
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - db-data:/app/data

  frontend:
    build: ./frontend
    container_name: genai-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  db-data:
